name: Build weather data
on:
  push:
    paths:
      - '.github/workflows/weather-data.yml'
  workflow_dispatch:
permissions:
  contents: write
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Fetch and aggregate weather
        shell: bash
        run: |
          python - <<'PY'
          import csv, json, math, urllib.parse, urllib.request
          from datetime import date

          start='2026-05-01'
          end='2026-07-16'
          cities = [
              ('美西','洛杉矶','Los Angeles, CA',34.0522,-118.2437,'America/Los_Angeles'),
              ('美中','达拉斯','Dallas, TX',32.7767,-96.7970,'America/Chicago'),
              ('美中','休斯敦','Houston, TX',29.7604,-95.3698,'America/Chicago'),
              ('美南','亚特兰大','Atlanta, GA',33.7490,-84.3880,'America/New_York'),
              ('美南','萨凡纳','Savannah, GA',32.0809,-81.0912,'America/New_York'),
              ('芝加哥','芝加哥','Chicago, IL',41.8781,-87.6298,'America/Chicago'),
              ('美东','纽瓦克','Newark, NJ',40.7357,-74.1724,'America/New_York'),
          ]

          def get_json(url):
              req=urllib.request.Request(url,headers={'User-Agent':'Mozilla/5.0'})
              with urllib.request.urlopen(req,timeout=60) as r:
                  return json.load(r)

          def fetch_city(lat,lon,tz):
              params={
                  'latitude':lat,'longitude':lon,'start_date':start,'end_date':end,
                  'daily':'temperature_2m_mean,temperature_2m_max',
                  'temperature_unit':'fahrenheit','timezone':tz,'models':'ecmwf_ifs'
              }
              archive='https://archive-api.open-meteo.com/v1/archive?'+urllib.parse.urlencode(params)
              try:
                  data=get_json(archive)
                  times=data.get('daily',{}).get('time',[])
                  means=data.get('daily',{}).get('temperature_2m_mean',[])
                  maxs=data.get('daily',{}).get('temperature_2m_max',[])
                  if len(times)>=70 and times[-1]==end and all(v is not None for v in means[-3:]+maxs[-3:]):
                      return data,'Open-Meteo Historical Weather API (ECMWF IFS)'
              except Exception:
                  pass
              params.pop('models',None)
              forecast='https://api.open-meteo.com/v1/forecast?'+urllib.parse.urlencode(params)
              return get_json(forecast),'Open-Meteo Forecast API (past days + current day)'

          city_rows=[]
          by_region={}
          sources=set()
          for region,city_cn,city_en,lat,lon,tz in cities:
              data,source=fetch_city(lat,lon,tz)
              sources.add(source)
              d=data['daily']
              for dt,mean_f,max_f in zip(d['time'],d['temperature_2m_mean'],d['temperature_2m_max']):
                  if mean_f is None or max_f is None: continue
                  mean_c=(mean_f-32)*5/9
                  max_c=(max_f-32)*5/9
                  city_rows.append([dt,region,city_cn,city_en,round(mean_f,1),round(max_f,1),round(mean_c,1),round(max_c,1),source])
                  by_region.setdefault((dt,region),[]).append((mean_f,max_f))

          region_order=['美中','美南','美西','芝加哥','美东']
          dates=sorted({r[0] for r in city_rows})
          regional=[]
          for dt in dates:
              row={'日期':dt}
              for region in region_order:
                  vals=by_region.get((dt,region),[])
                  if vals:
                      mf=sum(x[0] for x in vals)/len(vals)
                      xf=sum(x[1] for x in vals)/len(vals)
                      row[region]=(round(mf,1),round(xf,1),round((mf-32)*5/9,1),round((xf-32)*5/9,1))
              regional.append(row)

          with open('weather_city_detail.csv','w',newline='',encoding='utf-8-sig') as f:
              w=csv.writer(f)
              w.writerow(['日期','区域','城市（中文）','城市（英文）','平均气温°F','最高气温°F','平均气温°C','最高气温°C','数据来源'])
              w.writerows(city_rows)

          headers=['日期']
          for region in region_order:
              headers += [f'{region}-平均°F',f'{region}-最高°F',f'{region}-平均°C',f'{region}-最高°C']
          with open('weather_regional_daily.csv','w',newline='',encoding='utf-8-sig') as f:
              w=csv.writer(f); w.writerow(headers)
              for item in regional:
                  out=[item['日期']]
                  for region in region_order:
                      out += list(item.get(region,('','','','')))
                  w.writerow(out)

          meta={
              'start_date':start,'end_date':end,
              'region_mapping':{
                  '美中':'达拉斯、休斯敦每日均值',
                  '美南':'亚特兰大、萨凡纳每日均值',
                  '美西':'洛杉矶',
                  '芝加哥':'芝加哥',
                  '美东':'纽瓦克（新泽西）'
              },
              'sources':sorted(sources),
              'api_docs':'https://open-meteo.com/en/docs'
          }
          with open('weather_metadata.json','w',encoding='utf-8') as f: json.dump(meta,f,ensure_ascii=False,indent=2)
          PY
      - name: Commit generated data
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add weather_regional_daily.csv weather_city_detail.csv weather_metadata.json
          git commit -m "Generate regional weather data" || exit 0
          git push
